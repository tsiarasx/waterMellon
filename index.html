<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="scripts.js" ></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="title">Kanban Board</h1>
    </header>

    <div class="main_body">

        <div class="to_do">
            <h2>To Do</h2>
            <table class="table_to_do"></table>
        </div>

        <div class="in_progress">
            <h2>In Progress</h2>
            <table class="table_in_progress"></table>        
        </div>

        <div class="done">
            <h2>Done</h2>
            <table class="table_done"></table>
        </div>
    </div>
    <div class="add_task">
        <form action="">
            <input type="text" id="text" placeholder="Add Task">
            <button type="submit">Add</button>
        </form>
    </div>

    <footer>
        <p>Nothing here to see</p>
    </footer>
</body>
</html>
